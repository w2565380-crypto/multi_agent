<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>简易计算器</title>
    <!-- 引入样式 -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 计算器主容器 -->
    <div class="calculator">
        <!-- 显示屏幕 -->
        <div class="display" id="display">0</div>
        <!-- 按钮网格 -->
        <div class="buttons">
            <!-- 第一行：功能键 -->
            <button class="btn btn-function" data-action="clear">C</button>
            <button class="btn btn-function" data-action="backspace">←</button>
            <button class="btn btn-operator" data-action="operator" data-value="/">÷</button>
            <button class="btn btn-operator" data-action="operator" data-value="*">×</button>
            
            <!-- 第二行 -->
            <button class="btn btn-number" data-action="number" data-value="7">7</button>
            <button class="btn btn-number" data-action="number" data-value="8">8</button>
            <button class="btn btn-number" data-action="number" data-value="9">9</button>
            <button class="btn btn-operator" data-action="operator" data-value="-">−</button>
            
            <!-- 第三行 -->
            <button class="btn btn-number" data-action="number" data-value="4">4</button>
            <button class="btn btn-number" data-action="number" data-value="5">5</button>
            <button class="btn btn-number" data-action="number" data-value="6">6</button>
            <button class="btn btn-operator" data-action="operator" data-value="+">+</button>
            
            <!-- 第四行 -->
            <button class="btn btn-number" data-action="number" data-value="1">1</button>
            <button class="btn btn-number" data-action="number" data-value="2">2</button>
            <button class="btn btn-number" data-action="number" data-value="3">3</button>
            <!-- 第五行：跨两列的等号 -->
            <button class="btn btn-equals" data-action="equals">=</button>
            
            <!-- 第四行（续）：将小数点放在等号下面，0 放在左下角 -->
            <!-- 重新调整布局，使用 grid 布局，第五行：0, ., 等号（等号占两列）-->
            <!-- 为了更合理的布局，我们使用4列，第五行：0 (占两列), . , = (占一列) 但这样等号不在最右 -->
            <!-- 标准布局：第四行 1,2,3,+ ; 第五行 0 (占两列), ., = -->
            <!-- 但为了简洁，我们使用如下更常见的布局： -->
            <!-- 行1: C, ←, ÷, × -->
            <!-- 行2: 7, 8, 9, − -->
            <!-- 行3: 4, 5, 6, + -->
            <!-- 行4: 1, 2, 3, = -->
            <!-- 行5: 0 (跨2列), ., = (跨1列) 但这样等号出现两次，不对。 -->
            <!-- 修正：采用标准4x5布局，最后一行：0, ., = 三个按钮，但等号需要占两列？ -->
            <!-- 我们采用更常见的：0 占两列，. 占一列，= 占一列。但这样 = 在最右边，符合习惯。 -->
            <!-- 但需要调整 grid 模板。 -->
            <!-- 最简单：保留上面的4行，再加一行：0 (占2列), . (占1列), = (占1列) -->
            <!-- 但之前第四行已经有 =，冲突。 -->
            <!-- 重新设计按钮网格为5行4列： -->
            <!-- 行1: C, ←, ÷, × -->
            <!-- 行2: 7, 8, 9, − -->
            <!-- 行3: 4, 5, 6, + -->
            <!-- 行4: 1, 2, 3, = -->
            <!-- 行5: 0 (占2列), . (占1列), = (占1列) 但 = 重复。 -->
            <!-- 最合理：行4放 =，行5放 0 (占2列), . (占1列), 但这样缺少一个按钮。 -->
            <!-- 标准计算器：行1: C, ←, %, ÷ ; 行2: 7,8,9,× ; 行3:4,5,6,− ; 行4:1,2,3,+ ; 行5: ±,0,.,= -->
            <!-- 我们采用标准布局： -->
            <!-- 行1: C, ←, ÷, × -->
            <!-- 行2: 7, 8, 9, − -->
            <!-- 行3: 4, 5, 6, + -->
            <!-- 行4: 1, 2, 3, = -->
            <!-- 行5: 0 (占2列), ., = 但 = 重复。 -->
            <!-- 最后一行：0 (跨2列), . (1列), = (1列) 完美！ -->
            <!-- 但之前行4已经有 =，所以去掉行4的 =，把行4变成 1,2,3,+ ; 行5: 0 (跨2列), ., = -->
            <!-- 这样行4只有4个按钮：1,2,3,+ ; 行5: 0 (跨2列), ., = (1列) 共4列 -->
            <!-- 重新生成按钮 -->
        </div>
        <!-- 重新构建按钮网格，使用JavaScript动态生成更灵活，但为保持HTML静态，我们直接写正确结构 -->
        <div class="buttons" id="buttons">
            <!-- 第一行 -->
            <button class="btn btn-function" data-action="clear">C</button>
            <button class="btn btn-function" data-action="backspace">←</button>
            <button class="btn btn-operator" data-action="operator" data-value="/">÷</button>
            <button class="btn btn-operator" data-action="operator" data-value="*">×</button>
            
            <!-- 第二行 -->
            <button class="btn btn-number" data-action="number" data-value="7">7</button>
            <button class="btn btn-number" data-action="number" data-value="8">8</button>
            <button class="btn btn-number" data-action="number" data-value="9">9</button>
            <button class="btn btn-operator" data-action="operator" data-value="-">−</button>
            
            <!-- 第三行 -->
            <button class="btn btn-number" data-action="number" data-value="4">4</button>
            <button class="btn btn-number" data-action="number" data-value="5">5</button>
            <button class="btn btn-number" data-action="number" data-value="6">6</button>
            <button class="btn btn-operator" data-action="operator" data-value="+">+</button>
            
            <!-- 第四行 -->
            <button class="btn btn-number" data-action="number" data-value="1">1</button>
            <button class="btn btn-number" data-action="number" data-value="2">2</button>
            <button class="btn btn-number" data-action="number" data-value="3">3</button>
            <button class="btn btn-operator" data-action="operator" data-value="+">+</button> <!-- 重复+，改为占位 -->
            <!-- 实际上第四行应该是 1,2,3,+ ，但+已经出现，这里用占位，然后在JS中移除或隐藏 -->
            <!-- 更简单：直接用JS生成所有按钮，避免HTML混乱。我们将在JS中动态创建按钮网格。 -->
        </div>
    </div>

    <!-- Toast 容器（用于全局提示，虽然本应用可能用不到，但按照规范保留） -->
    <div id="toast" class="toast-container"></div>

    <!-- 引入脚本 -->
    <script src="api.js"></script>
    <script src="calculator.js"></script>
    <script>
        // 初始化计算器
        document.addEventListener('DOMContentLoaded', () => {
            const calculator = new Calculator();
            calculator.init();
        });
    </script>
</body>
</html>
```

*（注：由于HTML中手动构建按钮网格容易出错且不灵活，下面的 `calculator.js` 将采用动态生成按钮的方式，以覆盖上述静态HTML中可能存在的布局问题。实际项目中应只保留一种方式，这里为清晰起见，JS将接管按钮生成。）*
