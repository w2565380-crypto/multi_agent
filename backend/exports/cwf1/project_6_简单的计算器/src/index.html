<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简易计算器</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <div class="display" id="display">0</div>
        <div class="buttons">
            <!-- 第1行 -->
            <button class="btn" data-action="clear">C</button>
            <button class="btn" data-action="backspace">←</button>
            <button class="btn placeholder" data-action="placeholder" disabled></button>
            <button class="btn operator" data-action="divide">÷</button>
            <!-- 第2行 -->
            <button class="btn digit" data-action="7">7</button>
            <button class="btn digit" data-action="8">8</button>
            <button class="btn digit" data-action="9">9</button>
            <button class="btn operator" data-action="multiply">×</button>
            <!-- 第3行 -->
            <button class="btn digit" data-action="4">4</button>
            <button class="btn digit" data-action="5">5</button>
            <button class="btn digit" data-action="6">6</button>
            <button class="btn operator" data-action="subtract">-</button>
            <!-- 第4行 -->
            <button class="btn digit" data-action="1">1</button>
            <button class="btn digit" data-action="2">2</button>
            <button class="btn digit" data-action="3">3</button>
            <button class="btn operator" data-action="add">+</button>
            <!-- 第5行 -->
            <button class="btn digit zero" data-action="0">0</button>
            <button class="btn digit" data-action="decimal">.</button>
            <button class="btn operator" data-action="equals">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
